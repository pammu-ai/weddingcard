<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pramodh & Subhashini Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: black;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* Scroll snapping */
html {
  scroll-snap-type: y mandatory;
}

.section {
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* IMAGE STYLE */
.section img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform: scale(1.15);
  transition: transform 2s ease, opacity 1.5s ease;
  opacity: 0;
}

/* ACTIVE STATE */
.section.show img {
  transform: scale(1);
  opacity: 1;
}

/* GOLD OVERLAY GLOW */
.overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
  opacity: 0;
  transition: opacity 2s;
}

.section.show .overlay {
  opacity: 1;
}

/* FLOATING PARTICLES */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.particles span {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  animation: float 8s infinite ease-in-out;
  opacity: 0.6;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 0.6; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* BUTTONS */
.actions {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  background: gold;
  color: black;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* MUSIC BUTTON */
.music {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music">
  <button onclick="toggleMusic()">🔊 Music</button>
</div>

<!-- 🕉 Page 1 -->
<div class="section">
  <div class="overlay"></div>
  <img src="page1.jpg">
  <div class="particles"></div>
</div>

<!-- 👪 Page 2 -->
<div class="section">
  <div class="overlay"></div>
  <img src="page2.jpg">
  <div class="particles"></div>
</div>

<!-- 💑 Page 3 -->
<div class="section">
  <div class="overlay"></div>
  <img src="page3.jpg">
  <div class="particles"></div>
</div>

<!-- 🎉 Page 4 -->
<div class="section">
  <div class="overlay"></div>
  <img src="page4.jpg">
  <div class="particles"></div>
</div>

<!-- 💍 Page 5 -->
<div class="section">
  <div class="overlay"></div>
  <img src="page5.jpg">
  <div class="particles"></div>
</div>

<!-- ACTION BUTTONS -->
<div class="actions">
  <a href="invitation.pdf" download>
    <button>📄 PDF</button>
  </a>

  <a href="https://wa.me/?text=You're invited to Pramodh & Subhashini Wedding!" target="_blank">
    <button>📲 Share</button>
  </a>
</div>

<script>
/* Scroll Animation */
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.6 });

sections.forEach(sec => observer.observe(sec));

/* PARTICLES GENERATOR */
document.querySelectorAll('.particles').forEach(p => {
  for (let i = 0; i < 15; i++) {
    let span = document.createElement('span');
    span.style.left = Math.random() * 100 + "%";
    span.style.animationDelay = Math.random() * 5 + "s";
    span.style.animationDuration = 5 + Math.random() * 5 + "s";
    p.appendChild(span);
  }
});

/* MUSIC CONTROL */
function toggleMusic() {
  const music = document.getElementById("bgMusic");
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
